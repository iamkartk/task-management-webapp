server.port=8761
spring.application.name=EUREKA-SERVER
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# Service metadata for management
#eureka.instance.metadata-map.user.name=admin
#eureka.instance.metadata-map.user.password=admin123
spring.boot.admin.client.instance.name=EUREKA-SERVER
# Instance ID unique rakhne ke liye
eureka.instance.instance-id=${spring.application.name}:${random.value}
eureka.instance.metadata-map.management.port=8761
eureka.instance.metadata-map.management.context-path=/actuator
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoints.web.base-path=/actuator
#spring.boot.admin.client.url=http://localhost:9090
spring.boot.admin.client.enabled=false
management.server.port=8761
