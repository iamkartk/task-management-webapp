jwt:
  secret: mysecretkeymysecretkeymysecretkeymysecretkey
  expiration: 3600000
resilience4j:
  circuitbreaker:
    instances:
      notificationService:
        registerHealthIndicator: true
        slidingWindowSize: 5
        minimumNumberOfCalls: 3
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 2
        timeoutDuration: 2s
management:
  endpoints:
    web:
      exposure:
        include: "*"  # जरूरी endpoints
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true